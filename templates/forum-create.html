<!-- =============== SCREEN: FORUM CREATE =============== -->
<div class="scr hidden" id="scrForumCreate">

  <!-- ХЕДЕР -->
  <div class="scr-head">
    <button class="forum-back-btn" id="forumCreateClose" aria-label="Закрыть">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <span class="scr-head-title">Новая тема</span>
    <button class="forum-publish-btn disabled" id="forumPublishBtn" disabled>
      Опубликовать
    </button>
  </div>

  <!-- ФОРМА -->
  <div class="scr-body forum-create-body">

    <!-- КАТЕГОРИЯ -->
    <div class="forum-form-field">
      <label class="forum-form-label">
        Категория
        <span class="forum-form-required">обязательно</span>
      </label>
      <button class="forum-cat-select" id="forumCatSelect">
        <span class="forum-cat-select-text" id="forumCatSelectText">Выберите категорию</span>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <!-- Bottom sheet выбора категории -->
      <div class="forum-cat-sheet hidden" id="forumCatSheet">
        <div class="forum-cat-sheet-overlay" id="forumCatSheetOverlay"></div>
        <div class="forum-cat-sheet-content">
          <div class="forum-cat-sheet-title">Выберите категорию</div>
          <button class="forum-cat-option" data-cat="business" data-label="Бизнес">
            <span class="forum-cat-dot ct-biz-dot"></span>Бизнес
          </button>
          <button class="forum-cat-option" data-cat="marketing" data-label="Маркетинг">
            <span class="forum-cat-dot ct-mkt-dot"></span>Маркетинг
          </button>
          <button class="forum-cat-option" data-cat="tools" data-label="Инструменты">
            <span class="forum-cat-dot ct-tool-dot"></span>Инструменты
          </button>
          <button class="forum-cat-option" data-cat="education" data-label="Обучение">
            <span class="forum-cat-dot ct-edu-dot"></span>Обучение
          </button>
          <button class="forum-cat-option" data-cat="newbies" data-label="Новичкам">
            <span class="forum-cat-dot ct-new-dot"></span>Новичкам
          </button>
          <button class="forum-cat-option" data-cat="cases" data-label="Кейсы">
            <span class="forum-cat-dot ct-case-dot"></span>Кейсы
          </button>
          <button class="forum-cat-option" data-cat="offtop" data-label="Оффтоп">
            <span class="forum-cat-dot ct-off-dot"></span>Оффтоп
          </button>
        </div>
      </div>
    </div>

    <!-- ЗАГОЛОВОК -->
    <div class="forum-form-field">
      <label class="forum-form-label" for="forumTitleInput">
        Заголовок
        <span class="forum-char-count" id="forumTitleCount">0/100</span>
      </label>
      <input class="forum-text-input" id="forumTitleInput"
             type="text" maxlength="100"
             placeholder="О чём хотите поговорить?">
    </div>

    <!-- ТЕКСТ -->
    <div class="forum-form-field">
      <label class="forum-form-label" for="forumBodyInput">
        Текст
        <span class="forum-char-count" id="forumBodyCount">0/2000</span>
      </label>
      <textarea class="forum-text-area" id="forumBodyInput"
                maxlength="2000" rows="5"
                placeholder="Расскажите подробнее..."></textarea>
    </div>

    <!-- XP ПОДСКАЗКА -->
    <div class="forum-xp-hint">
      <svg width="16" height="16" fill="none" stroke="#22C55E" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      <span>За публикацию вы получите <strong>+15 XP</strong></span>
    </div>

    <!-- ПРЕВЬЮ -->
    <div class="forum-preview-block hidden" id="forumPreviewBlock">
      <div class="forum-preview-label">Предпросмотр</div>
      <div class="forum-preview-title" id="forumPreviewTitle"></div>
      <div class="forum-preview-text" id="forumPreviewText"></div>
      <div class="forum-preview-footer" id="forumPreviewFooter"></div>
    </div>

  </div>

</div>
