<!-- =============== SCREEN: FORUM TOPIC =============== -->
<div class="scr hidden" id="scrForumTopic">
  <div class="scr-head">
    <button class="forum-back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="scr-head-title forum-topic-title-h" id="forumTopicTitleH"></span>
    <button class="forum-icon-btn" id="forumTopicMoreBtn" onclick="openForumMore()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>

  <div class="forum-topic-body" id="forumTopicScroll">
    <!-- Topic header card -->
    <div class="topic-header" id="forumTopicHeader">
      <div class="topic-meta">
        <div class="forum-av" id="forumTopicAv" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700"></div>
        <div class="topic-meta-info">
          <div class="topic-author-name" id="forumTopicAuthor"></div>
          <div class="topic-time" id="forumTopicTime"></div>
        </div>
        <span class="cat-tag" id="forumTopicCatTag"></span>
      </div>
      <div class="topic-title" id="forumTopicTitle"></div>
      <div class="topic-body" id="forumTopicBody"></div>
      <div class="topic-stats" id="forumTopicStats">
        <div class="topic-stat forum-like-btn" id="forumTopicLike" onclick="forumLikeTopic()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          <span id="forumTopicLikeCount">0</span>
        </div>
        <div class="topic-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="forumTopicViews">0</span>
        </div>
        <div class="topic-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span id="forumTopicReplyCount">0</span>
        </div>
      </div>
    </div>

    <!-- Replies divider -->
    <div class="forum-replies-div" id="forumRepliesDiv">
      <div class="forum-replies-line"></div>
      <div class="forum-replies-count" id="forumRepliesCountLabel">0 ответов</div>
      <div class="forum-replies-line"></div>
    </div>

    <!-- Replies list -->
    <div id="forumReplies"></div>

    <!-- No replies -->
    <div class="forum-no-replies hidden" id="forumNoReplies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <div>Пока нет ответов. Будьте первым!</div>
    </div>

    <div class="forum-body-spacer"></div>
  </div>

  <div class="forum-reply-wrap" id="forumReplyBar">
    <div class="forum-reply-context" id="forumReplyContext">
      <div class="forum-reply-context-line"></div>
      <div class="forum-reply-context-text">
        <span class="forum-reply-context-author" id="forumReplyAuthor"></span>
        <span class="forum-reply-context-msg" id="forumReplyMsg"></span>
      </div>
      <button class="forum-reply-context-cancel" id="forumReplyCancelBtn" onclick="cancelForumReply()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="forum-input-row">
      <button class="forum-reply-attach">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea
        class="forum-reply-input"
        id="forumReplyInput"
        placeholder="Написать ответ..."
        rows="1"
      ></textarea>
      <button class="forum-reply-send" id="forumReplySendBtn" onclick="sendForumReply()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="replyCtxMenu" style="display:none;position:fixed;inset:0;z-index:99">
    <div id="replyCtxOverlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.5)"></div>
    <div id="replyCtxSheet" style="position:absolute;bottom:0;left:0;right:0;background:rgba(18,18,28,0.96);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:16px 16px 0 0;border-top:0.5px solid rgba(255,255,255,0.1);padding:8px 0 calc(8px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 300ms cubic-bezier(0.16,1,0.3,1)">
      <div style="width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 8px"></div>
      <div id="replyCtxItems"></div>
    </div>
  </div>
</div>
