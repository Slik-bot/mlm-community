<!-- ═══ SCREEN: CHAT ═══ -->
<div class="scr hidden" id="scrChat">

  <!-- Панель мультиселекта -->
  <div class="sel-head" id="selHead">
    <button class="sel-head__cancel"
      id="selCancel">×</button>
    <span class="sel-head__count"
      id="selCount">Выбрано: 0</span>
  </div>

  <!-- Шапка -->
  <div class="ch-head" id="chHead">
    <button class="ch-back" id="chBack" onclick="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <div class="ch-center" onclick="goTo('scrChatInfo')">
      <div class="ch-name" id="chName"></div>
      <div class="ch-status" id="chStatus">В сети</div>
    </div>
    <div class="ch-hbtns">
      <button class="ch-icon-btn" id="chatSearchBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="ch-icon-btn" id="chatTfBtn" onclick="chatTransfer()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </button>
      <div class="ch-av" onclick="goTo('scrChatInfo')">
        <div class="ch-av-ph" id="chAvPh"></div>
        <div class="ch-av-dot hidden" id="chAvDot"></div>
      </div>
      <button class="ch-icon-btn" id="chatMoreBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
          <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
        </svg>
      </button>
      <div class="ch-more-menu" id="chatMoreMenu">
        <button class="ch-more-item" id="chMenuSearch">
          <span>🔍</span> Поиск в чате
        </button>
        <button class="ch-more-item" id="chMenuClear">
          <span>🗑</span> Очистить историю
        </button>
        <button class="ch-more-item" id="chMenuMute">
          <span>🔕</span> Отключить уведомления
        </button>
        <button class="ch-more-item ch-more-item--danger" id="chMenuBlock">
          <span>🚫</span> Заблокировать
        </button>
        <button class="ch-more-item ch-more-item--danger" id="chMenuReport">
          <span>⚠️</span> Пожаловаться
        </button>
      </div>
    </div>
  </div>

  <!-- Панель поиска -->
  <div class="ch-search" id="chatSearch">
    <input class="ch-search-input"
      id="chatSearchInput"
      type="text"
      placeholder="Поиск в чате..."
      autocomplete="off"/>
    <div class="ch-search-nav">
      <span id="chatSearchCount"></span>
      <button class="ch-search-btn"
        id="chatSearchPrev">↑</button>
      <button class="ch-search-btn"
        id="chatSearchNext">↓</button>
    </div>
    <button class="ch-search-close"
      id="chatSearchClose">×</button>
  </div>

  <!-- Баннер сделки (скрыт если нет сделки) -->
  <div class="deal-top hidden" id="dealTop">
    <div class="dt-r1">
      <div class="dt-title" id="dtTitle"></div>
      <div class="dt-amt" id="dtAmt"></div>
    </div>
    <div class="dt-bar"><div class="dt-fill" id="dtFill"></div></div>
    <div class="dt-r2">
      <div class="dt-m" id="dtProgress"></div>
      <div class="dt-m" id="dtDeadline"></div>
    </div>
  </div>

  <!-- Закреплённое сообщение -->
  <div id="pinBanner">
    <span class="pin-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg></span>
    <div class="pin-body">
      <span class="pin-name">Закреплено</span>
      <span class="pin-preview" id="pinPreview"></span>
    </div>
    <span class="pin-counter" id="pinCounter"></span>
    <button class="pin-close" id="pinClose">&times;</button>
  </div>

  <!-- Сообщения -->
  <div class="ch-float-date" id="chatFloatDate"></div>
  <div class="ch-msgs" id="chatMessages"></div>

  <!-- Typing indicator -->
  <div class="typing-w hidden" id="chatTyping">
    <div class="typing-bbl">
      <div class="td"></div>
      <div class="td"></div>
      <div class="td"></div>
    </div>
  </div>

  <!-- Кнопка вниз -->
  <button class="ch-scroll-btn hidden" id="chScrollBtn" onclick="scrollToBottom()">
    <svg width="16" height="16" fill="none" stroke="currentColor"
      stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
    <span class="ch-scroll-badge hidden" id="chScrollBadge">0</span>
  </button>

  <!-- Footer -->
  <div class="ch-foot">
    <div class="reply-bar hidden" id="chatReplyBar">
      <div class="rb-line"></div>
      <div class="rb-txt" id="chatReplyText"></div>
      <button class="rb-x" onclick="cancelReply()">
        <svg width="10" height="10" fill="none" stroke="currentColor"
          stroke-width="2.8" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div id="editBar">
      <svg class="edit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span class="edit-preview" id="editPreview"></span>
      <button class="edit-cancel" onclick="window.closeEdit?.()">×</button>
    </div>
    <div class="char-count hidden" id="chatCharCount"></div>
    <div class="ch-row">
      <button class="ch-att" onclick="chatAttachFile()">
        <svg width="16" height="16" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea class="ch-ta" id="chatInput"
        placeholder="Сообщение..." rows="1"
        oninput="chatInputResize(this); chatToggleSend()"
        onkeydown="chatInputKeydown(event)"></textarea>
      <button class="ch-send" id="chatSendBtn">
        <svg width="16" height="16" fill="none" stroke="white"
          stroke-width="2.3" stroke-linecap="round" viewBox="0 0 24 24">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- TF Modal -->
  <div class="tf-ov" id="chatTfOv" onclick="hideTfModal()">
    <div class="tf-sheet" onclick="event.stopPropagation()">
      <div class="tf-sh"></div>
      <div class="tf-st">Перевести TF</div>
      <div class="tf-ss" id="tfRecipient"></div>
      <div class="tf-iw">
        <svg width="17" height="17" fill="none" stroke="#fbbf24"
          stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <input class="tf-inp" id="tfInput" placeholder="0"
          type="number" oninput="calcTf(this.value)">
        <span class="tf-u">TF</span>
      </div>
      <div class="tf-cv" id="tfConvert">≈ $0.00</div>
      <button class="tf-btn" onclick="sendTf()">Перевести</button>
    </div>
  </div>

  <div class="fwd-sheet" id="fwdSheet">
    <div class="fwd-sheet__backdrop" id="fwdBackdrop"></div>
    <div class="fwd-sheet__body">
      <div class="fwd-sheet__header">
        <span class="fwd-sheet__title">Переслать в...</span>
        <button class="fwd-sheet__close" id="fwdClose">&times;</button>
      </div>
      <input class="fwd-sheet__search" id="fwdSearch"
        placeholder="Поиск чата..." autocomplete="off"/>
      <div class="fwd-sheet__list" id="fwdList"></div>
    </div>
  </div>

  <!-- Панель действий мультиселекта -->
  <div class="sel-bar" id="selBar">
    <button class="sel-bar__btn"
      id="selForward">
      <svg width="22" height="22"
        viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <polyline points="15 17 20 12 15 7"/>
        <path d="M4 18v-2a4 4 0 0 1 4-4h12"/>
      </svg>
      <span>Переслать</span>
    </button>
    <button class="sel-bar__btn"
      id="selCopy">
      <svg width="22" height="22"
        viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13"
          height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4
          a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <span>Копировать</span>
    </button>
    <button class="sel-bar__btn sel-bar__btn--red"
      id="selDelete">
      <svg width="22" height="22"
        viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      <span>Удалить</span>
    </button>
  </div>

</div>
