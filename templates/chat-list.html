<!-- =============== SCREEN: CHAT LIST =============== -->
<div class="scr hidden" id="scrChatList">

  <!-- Шапка -->
  <div class="scr-head">
    <div class="scr-head-spacer"></div>
    <span class="scr-head-title">Сообщения</span>
    <button class="icon-btn" onclick="chatStartNew()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
    </button>
  </div>

  <!-- Табы -->
  <div class="cl-tabs">
    <button id="clTabAll" class="cl-tab active" data-tab="all">Все</button>
    <button id="clTabPersonal" class="cl-tab" data-tab="personal">Личные</button>
    <button id="clTabDeals" class="cl-tab" data-tab="deal">Сделки</button>
    <button id="clTabBroker" class="cl-tab" data-tab="broker">Брокер</button>
  </div>

  <!-- Поиск -->
  <div class="cl-search-wrap">
    <svg class="cl-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="clSearch" class="cl-search" type="text" placeholder="Поиск по имени...">
  </div>

  <!-- Скелетон загрузки (виден по умолчанию) -->
  <div id="clSkeleton" class="cl-skeleton">
    <div class="cl-skeleton-item"></div>
    <div class="cl-skeleton-item"></div>
    <div class="cl-skeleton-item"></div>
    <div class="cl-skeleton-item"></div>
  </div>

  <!-- Список чатов (скрыт до загрузки) -->
  <div id="clList" class="cl-list hidden"></div>

  <!-- Пустое состояние (скрыто по умолчанию) -->
  <div id="clEmpty" class="cl-empty hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <div class="cl-empty-text">Нет диалогов</div>
    <div class="cl-empty-sub">Начните общение первым</div>
  </div>

</div>
