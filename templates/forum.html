<!-- =============== SCREEN: FORUM =============== -->
<div class="scr hidden" id="scrForum">

  <!-- ХЕДЕР -->
  <div class="scr-head">
    <span class="scr-head-title">Форум</span>
    <div class="forum-head-icons">
      <button class="forum-icon-btn" id="forumSearchBtn" aria-label="Поиск">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
      </button>
      <button class="forum-icon-btn" id="forumFilterBtn" aria-label="Фильтр">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- ПОИСКОВАЯ СТРОКА (скрыта по умолчанию) -->
  <div class="forum-search-bar hidden" id="forumSearchBar">
    <input class="forum-search-input" id="forumSearchInput"
           type="text" placeholder="Поиск по темам..." oninput="forumSearch(this.value)">
    <button class="forum-search-close" id="forumSearchClose">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- КАТЕГОРИИ — горизонтальный скролл -->
  <div class="forum-cats" id="forumCats">
    <button class="forum-cat active" data-cat="all" onclick="forumFilterCat('all')">Все</button>
    <button class="forum-cat" data-cat="business" onclick="forumFilterCat('business')">Бизнес</button>
    <button class="forum-cat" data-cat="marketing" onclick="forumFilterCat('marketing')">Маркетинг</button>
    <button class="forum-cat" data-cat="tools" onclick="forumFilterCat('tools')">Инструменты</button>
    <button class="forum-cat" data-cat="education" onclick="forumFilterCat('education')">Обучение</button>
    <button class="forum-cat" data-cat="newbies" onclick="forumFilterCat('newbies')">Новичкам</button>
    <button class="forum-cat" data-cat="cases" onclick="forumFilterCat('cases')">Кейсы</button>
    <button class="forum-cat" data-cat="offtop" onclick="forumFilterCat('offtop')">Оффтоп</button>
  </div>

  <!-- СОРТИРОВКА -->
  <div class="forum-sort-tabs" id="forumSortTabs">
    <button class="forum-sort-tab active" data-sort="created_at" onclick="forumSort('created_at')">Новые</button>
    <button class="forum-sort-tab" data-sort="hot" onclick="forumSort('hot')">Горячие</button>
    <button class="forum-sort-tab" data-sort="likes_count" onclick="forumSort('likes_count')">Топ</button>
  </div>

  <!-- СПИСОК ТЕМ -->
  <div class="scr-body" id="forumList">
    <!-- JS рендерит сюда карточки -->
  </div>

  <!-- ПУСТОЕ СОСТОЯНИЕ (скрыто по умолчанию) -->
  <div class="forum-empty hidden" id="forumEmpty">
    <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <p class="forum-empty-title">Тем пока нет</p>
    <p class="forum-empty-sub">Будьте первым — поделитесь идеей!</p>
    <button class="btn-primary" onclick="goTo('scrForumCreate')">
      Создать тему
    </button>
  </div>

  <!-- FAB — кнопка создать -->
  <button class="forum-fab" id="forumFab" onclick="goTo('scrForumCreate')" aria-label="Создать тему">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

</div>
